<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    *{
      box-sizing: border-box;
    }
    body{
      margin: 0;
      background-color: hsl(0, 0%, 8%);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;  
    }
    .container{ 
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 348px;
      background-color: hsl(0, 0%, 12%);
      border-radius: 15px;
      padding: 40px;
    }
    .avatar{ 
      display: block;
      width: 81px;
      height: 81px;
      border-radius: 50%;
    }
    .info{ 
      text-align: center;
    }

    .name{ 
      color: hsl(0, 0%, 100%);
      text-align: center;
      margin-top: 27px;
      font-size: 25px;
      font-weight: 700;
    }
    .location{ 
      margin-top: 14px;
      color:hsl(75, 94%, 57%);
      font-size: 14px;
      font-weight: 600;
    }
    .description{ 
      color: hsl(0, 0%, 100%);
      text-align: center;
      margin-top: 27px;
      font-size: 14px;
      font-weight: 400;
    }
    .options{ 
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      margin-top: 30px;
      width: 100%;
    }
    .option{ 
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 48px;
      background-color: hsl(0, 0%, 20%);
      border-radius: 8px;
      color: hsl(0, 0%, 100%);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }
    .option:hover{
      background-color: hsl(75, 94%, 57%);
      cursor: pointer;
      color:black;
    }
  </style>
</head>
<body>
<div class="container"> 
  <img class="avatar" src="./assets/images/avatar-jessica.jpeg" >
  <div class="info">
    <h1 class="name">Jessica Randall</h1>
    <p class="location">London, United Kingdom</p>
    <p class="description">
      "Front-end developer and avid reader."
    </p>
  </div>
  <div class="options"> 
      <a class="option" href="#">GitHub</a>
      <a class="option" href="#">Frontend Mentor</a>
      <a class="option" href="#">LinkedIn</a>
      <a class="option" href="#">Twitter</a>
      <a class="option" href="#">Instagram</a>
  </div>
</div>
</body>
</html>
